name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l .; exit 1)
      - name: vet
        run: go vet ./...
      - name: build
        run: CGO_ENABLED=0 go build -trimpath ./cmd/deadair
      - name: test
        run: go test -race ./...

  # M1 read-only proof: least-privilege role validated against a live Elastic
  # stack, every write attempt with the deadair credential rejected.
  elastic-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        elastic-version: ["8.17.4"]
    env:
      ELASTIC_VERSION: ${{ matrix.elastic-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: start elastic stack ${{ matrix.elastic-version }}
        run: docker compose -f integration/docker-compose.yml up -d --wait
      - name: integration tests
        run: go test -tags=integration -count=1 -v ./integration -run TestElastic
      - name: stack logs on failure
        if: failure()
        run: docker compose -f integration/docker-compose.yml logs --tail=150
      - name: teardown
        if: always()
        run: docker compose -f integration/docker-compose.yml down -v

  opensearch-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        opensearch-version: ["2.19.3"]
    env:
      OPENSEARCH_VERSION: ${{ matrix.opensearch-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: start opensearch stack ${{ matrix.opensearch-version }}
        run: docker compose -f integration/opensearch-docker-compose.yml up -d --wait
      - name: integration tests
        run: go test -tags=integration -count=1 -v ./integration -run TestOpenSearch
      - name: stack logs on failure
        if: failure()
        run: docker compose -f integration/opensearch-docker-compose.yml logs --tail=150
      - name: teardown
        if: always()
        run: docker compose -f integration/opensearch-docker-compose.yml down -v

  fleet-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: start both stacks
        run: |
          docker compose -f integration/docker-compose.yml up -d --wait
          docker compose -f integration/opensearch-docker-compose.yml up -d --wait
      - name: cross-backend fleet proof
        run: go test -tags=integration -count=1 -v ./integration -run TestFleet
      - name: teardown
        if: always()
        run: |
          docker compose -f integration/opensearch-docker-compose.yml down -v
          docker compose -f integration/docker-compose.yml down -v
