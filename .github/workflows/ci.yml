name: ci

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  validate:
    name: Validate (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: Format, vet, unit, race, static build, and module checks
        run: make validate
      - name: Cross-compile release targets
        env:
          CGO_ENABLED: "0"
        run: |
          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64 windows/amd64 windows/arm64; do
            goos=${target%/*}
            goarch=${target#*/}
            echo "Building ${goos}/${goarch}"
            GOOS=${goos} GOARCH=${goarch} go build -trimpath -o /dev/null ./cmd/deadair
          done

  windows:
    name: Unit and build (Windows)
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: Unit tests
        run: go test ./...
      - name: Static build
        run: go build -trimpath ./cmd/deadair
        env:
          CGO_ENABLED: "0"
