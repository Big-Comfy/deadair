name: deadair-opensearch-integration

services:
  opensearch:
    image: opensearchproject/opensearch:${OPENSEARCH_VERSION:-2.19.3}
    environment:
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${DEADAIR_IT_OPENSEARCH_ADMIN_PASSWORD:-DeadairAdmin123!}
      plugins.security.ssl.http.enabled: "false"
      cluster.routing.allocation.disk.threshold_enabled: "false"
      OPENSEARCH_JAVA_OPTS: -Xms1g -Xmx1g
    ports:
      - "9201:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsu admin:$${OPENSEARCH_INITIAL_ADMIN_PASSWORD} http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(yellow|green)\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
